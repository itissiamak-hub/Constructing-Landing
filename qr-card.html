<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Parkook QR</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f2eb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .qr-card {
      background: #ffffff;
      padding: 24px 28px;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
      text-align: center;
    }
    .qr-title {
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-size: 0.85rem;
      margin-bottom: 12px;
    }
    .qr-footer {
      margin-top: 12px;
      font-size: 0.8rem;
      color: #666666;
    }
    .qr-footer a {
      color: #c89b2e;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="qr-card">
    <div class="qr-title">YOU BUILD, WE PRESENT</div>
    <a href="https://itissiamak-hub.github.io/Constructing-Landing/project-demo.html" target="_blank" rel="noopener">
      <img
        src="https://api.qrserver.com/v1/create-qr-code/?size=400x400&amp;data=https%3A%2F%2Fitissiamak-hub.github.io%2FConstructing-Landing%2Fproject-demo.html"
        alt="QR code linking to Parkook construction and renovation demo website"
        width="240"
        height="240"
      />
    </a>
    <div class="qr-footer">
      all right reserved to <a href="https://parkook.com" target="_blank" rel="noopener">Parkook.com</a>
    </div>
  </div>
</body>
</html>
